<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monark Lens</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="head">
      <span class="brand"><span class="brand-logo">◎</span> Monark Lens</span>
      <span id="version" class="ver"></span>
    </header>

    <!-- Connecté -->
    <section id="account" class="card" hidden>
      <div class="acct-row">
        <span id="acct-email" class="acct-email"></span>
        <span id="acct-plan" class="pill"></span>
      </div>
      <div class="acct-credits">
        <span class="k">Crédits</span><span id="acct-credits" class="num"></span>
      </div>
      <button id="logout" class="btn ghost" type="button">Déconnexion</button>
    </section>

    <!-- Déconnecté -->
    <section id="login" class="card" hidden>
      <div class="muted">Connecte-toi pour analyser et collecter.</div>
      <form id="login-form" class="login-form">
        <input id="email" type="email" placeholder="email" autocomplete="username" />
        <input id="password" type="password" placeholder="mot de passe" autocomplete="current-password" />
        <button class="btn" type="submit">Connexion</button>
      </form>
      <div id="login-error" class="error"></div>
    </section>

    <!-- Détection de l'onglet courant -->
    <section class="card">
      <div class="sec-label">Onglet courant</div>
      <div id="detected" class="detected">…</div>
    </section>

    <!-- Collecte passive -->
    <section class="card">
      <label class="toggle">
        <span class="toggle-text">
          <span class="toggle-title">Collecte passive</span>
          <span class="toggle-sub">Gagne des crédits en parcourant les annonces</span>
        </span>
        <input id="auto-signal" type="checkbox" class="toggle-input" />
        <span class="switch"></span>
      </label>
      <div class="session">
        <div class="stat"><span id="sess-signals" class="num">0</span><span class="stat-k">signaux envoyés</span></div>
        <div class="stat"><span id="sess-credits" class="num">+0</span><span class="stat-k">crédits gagnés</span></div>
      </div>
    </section>

    <a id="open-web" class="weblink" target="_blank" rel="noopener">Ouvrir Monark →</a>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
